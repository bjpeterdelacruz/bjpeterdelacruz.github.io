        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="katas-page-header">
                        <h1 class="display-6 text-center title">Codewars Katas</h1>
                        <p>I have completed <span id="number-of-katas-completed">0</span> katas on <a href="https://www.codewars.com" target="_blank">Codewars</a>.
                        Click on the name of a kata below to view my solution.</p>
                    </div>

                    <table id="katas-table">
                        <thead>
                            <tr id="katas-table-header-row" class="katas-row-dark-mode">
                                <th></th>
                                <th>Kata Name</th>

        <script src="js/bootstrap.min.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", async (event) => {
                let response = await fetch('https://www.codewars.com/api/v1/users/bjpeterdelacruz/code-challenges/completed?page=0');
                let json = await response.json();
                const totalPages = json['totalPages'];
                let totalItems = json['totalItems'];
                const total = totalItems.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
                document.getElementById('number-of-katas-completed').innerHTML = total;
                const dateFormatOptions = { year: 'numeric', month: 'long', day: 'numeric' };
                for (let idx = 0; idx < totalPages; idx++) {
                    const url = `https://www.codewars.com/api/v1/users/bjpeterdelacruz/code-challenges/completed?page=${idx}`;
                    response = await fetch(url);
                    json = await response.json();
                    const data = json['data'];
                    data.forEach(async (kata) => {
                        const row = document.createElement('tr');
                        const kataNumber = document.createElement('td');
                        row.appendChild(kataNumber);
                        row.setAttribute("class", "katas-row-dark-mode");
                        kataNumber.innerHTML = `${totalItems--}.`;

                        const kataName = document.createElement('td');
                        let filename = `${kata['slug'].replace(/[^a-zA-Z0-9]+/g, "_")}.py`;
                        let language = kata['completedLanguages'][0].toLowerCase();
                        if (filename === "1_two_3_four_5.py") {
                            filename = "one_two_3_four_5.py";
                        }
                        if (language === "javascript" || language === "coffeescript" || language === "typescript") {
                            language = "javascript-coffeescript-typescript";
                        }
                        const link = `https://bitbucket.org/bjpeterdelacruz/${language}-katas/src/master/codewars/${filename}`;
                        let kataNameAndLanguage = language === "python" ? `<a href=${link} target="_blank">${kata['name']}</a>` : kata['name'];
                        const languages = kata['completedLanguages']
                            .map(language => `${language.charAt(0).toUpperCase()}${language.slice(1).toLowerCase()}`).join(', ');
                        kataNameAndLanguage += `<br/>${languages}`;
                        kataName.innerHTML = kataNameAndLanguage;
                        row.appendChild(kataName);

                        const completedOn = document.createElement('td');
                        const dateString = kata['completedAt'].replaceAll("-", "").replaceAll(":", "");
                        const completedDate = new Date(Date.UTC(
                            dateString.substr(0, 4),
                            Number.parseInt(dateString.substr(4, 2)) - 1,
                            dateString.substr(6, 2),
                            dateString.substr(9, 2),
                            dateString.substr(11, 2),
                            dateString.substr(13, 2)
                        ));
                        completedOn.innerHTML = completedDate.toLocaleString("en-US", dateFormatOptions);
                        row.appendChild(completedOn);

                        document.getElementById('katas-table-body').appendChild(row);
                    });
                }
            });
        </script>
