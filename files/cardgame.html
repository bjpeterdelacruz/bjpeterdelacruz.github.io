<html>
    <head>
        <script>
            async function getRandomCard() {
                const response = await fetch('https://wb9yjxyfs1.execute-api.us-east-2.amazonaws.com/dev/GetRandomPlayingCards',
                    {
                        mode: 'cors',
                        headers: {
                            'Access-Control-Allow-Origin':'*'
                        }
                    });
                setImageToSVG(response);
            }
            function setImageToSVG(svg) {
                var xml = (new XMLSerializer).serializeToString(svg);
                document.querySelector('img').src = "data:image/svg+xml;charset=utf-8," + xml;
            ​}
        </script>
    </head>
    <body style="background-color: blue;" onload="getRandomCard()">
        <img src="" />
    </body>
</html>
