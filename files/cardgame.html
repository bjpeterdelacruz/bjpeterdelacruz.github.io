<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN" crossorigin="anonymous"></script>
        <style>
            .add-top-padding {
                padding-top: 2rem;
            }
            .add-right-padding {
                padding-right: 2rem;
            }
        </style>
        <script>
            function updateFormControl() {
                if (document.getElementById('useMultipleDecks').checked) {
                    document.getElementById('count').setAttribute('max', 500);
                }
                else {
                    document.getElementById('count').setAttribute('max', 52);
                    if (document.getElementById('count').value > 52) {
                        document.getElementById('count').value = 52;
                    }
                }
            }
            function getRandomCard() {
                const count = document.getElementById('count').value;
                const useMultipleDecks = document.getElementById('useMultipleDecks').checked ? 'yes' : 'no';
                const response = fetch(`https://l4zfvy5e90.execute-api.us-east-2.amazonaws.com/prod/cards`,
                    {
                        method: 'POST',
                        headers: {
                            'Accept': 'application/json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({count: Number.parseInt(count), useMultipleDecks: useMultipleDecks})
                    })
                    .then((response) => response.json())
                    .then((json) => {
                        const maxCardsPerRow = 4;
                        document.getElementById('playing-cards').innerHTML = '';
                        let rowDiv = document.createElement('div');
                        rowDiv.setAttribute('class', 'row');
                        let cardDiv = document.createElement('div');
                        cardDiv.setAttribute('class', 'col-lg-3 col-md-2 col-sm-1 add-top-padding d-flex align-items-center justify-content-center');
                        const count = parseInt(json["count"]);
                        for (let idx = 0, numCards = 1; idx < count; idx++, numCards++) {
                            const img = document.createElement('img');
                            img.src = 'data:image/svg+xml;base64,' + btoa(json["cards"][idx]);
                            cardDiv.appendChild(img);
                            rowDiv.appendChild(cardDiv);
                            cardDiv = document.createElement('div');
                            cardDiv.setAttribute('class', 'col-lg-3 col-md-2 col-sm-1 add-top-padding d-flex align-items-center justify-content-center');
                            if (numCards === maxCardsPerRow || idx + 1 === count) {
                                document.getElementById('playing-cards').appendChild(rowDiv);
                                if (idx + 1 !== count) { // There are still more cards
                                    rowDiv = document.createElement('div');
                                    rowDiv.setAttribute('class', 'row');
                                }
                                numCards = 0;
                            }
                        }
                    });
            }
            window.onload = getRandomCard;
        </script>
    </head>
    <body class="container">
        <div class="row add-top-padding">
            <div class="col-12 d-flex align-items-center justify-content-center">
                <div class="form-row add-right-padding">
                    <div class="col">
                      <input id="count" type="number" value="1" min="1" max="52" class="form-control">
                    </div>
                    <div class="col form-check add-top-padding">
                        <input class="form-check-input" type="checkbox" value="" id="useMultipleDecks" onchange="updateFormControl()">
                        <label class="form-check-label" title="If checked, cards with a suit and a value may appear more than once." for="useMultipleDecks">
                          Use multiple decks?
                        </label>
                    </div>
                  </div>
                <button type="button" class="btn btn-primary" onclick="getRandomCard()">Get Random Cards</button>
            </div>
        </div>
        <div id="playing-cards">
        </div>
    </body>
</html>
